name: Full Run

on:
  workflow_dispatch:

jobs:
  full_run:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - name: Run all paper reproductions
        run: julia --project -e 'using HydroElasticFEM_Colomes2023; run_tests("all")'
      - name: Upload paper figures
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures
          path: plots/
          if-no-files-found: warn
